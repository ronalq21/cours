<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis Sílabos Universitarios</title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    margin:0;
    background:#eef2f7;
    color:#333;
}


/* CABECERA */

header{
    background:#003366;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
}


/* CONTENEDOR */

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}


/* DATOS */

.info{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 3px 10px #ccc;
}


/* BUSCADOR */

#buscar{
    width:100%;
    padding:12px;
    margin:20px 0;
    border-radius:8px;
    border:1px solid #aaa;
}


/* SEMESTRES */

.semestre{
    background:white;
    margin-bottom:15px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 8px #ccc;
}


.titulo{
    background:#0066cc;
    color:white;
    padding:15px;
    cursor:pointer;
    font-size:18px;
}


.contenido{
    display:none;
    padding:15px;
}


/* CURSOS */

.curso{
    background:#f5f5f5;
    margin:10px 0;
    padding:15px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}


a{
    text-decoration:none;
    background:#009933;
    color:white;
    padding:8px 15px;
    border-radius:6px;
}


a:hover{
    background:#006622;
}


</style>

</head>


<body>


<header>

<h1>Repositorio de Sílabos</h1>

<p>Ingeniería Estadística e Informática</p>

</header>



<div class="container">


<div class="info">

<h2>Estudiante</h2>

<p><b>Nombre:</b> Ronaldhino Jinez</p>

<p><b>Universidad:</b> Universidad del Altiplano Puno</p>

<p><b>Periodo:</b> 2026</p>

</div>


<input 
type="text" 
id="buscar" 
placeholder="Buscar curso..."
onkeyup="buscarCurso()">



<div class="semestre">


<div class="titulo" onclick="mostrar(this)">
📘 Primer Semestre
</div>


<div class="contenido">


<div class="curso">

<span>Matemática I</span>

<a href="pdf/matematica1.pdf" target="_blank">
Ver sílabo
</a>

</div>



<div class="curso">

<span>Programación</span>

<a href="pdf/programacion.pdf" target="_blank">
Ver sílabo
</a>

</div>


</div>


</div>




<div class="semestre">


<div class="titulo" onclick="mostrar(this)">
📗 Segundo Semestre
</div>


<div class="contenido">


<div class="curso">

<span>Estadística I</span>

<a href="pdf/estadistica.pdf" target="_blank">
Ver sílabo
</a>

</div>


</div>


</div>



</div>




<script>


function mostrar(elemento){

let contenido = elemento.nextElementSibling;


if(contenido.style.display=="block"){

contenido.style.display="none";

}else{

contenido.style.display="block";

}

}




function buscarCurso(){

let texto=document
.getElementById("buscar")
.value
.toLowerCase();



let cursos=document
.getElementsByClassName("curso");



for(let i=0;i<cursos.length;i++){


let nombre=cursos[i]
.innerText
.toLowerCase();



if(nombre.includes(texto)){

cursos[i].style.display="flex";

}else{

cursos[i].style.display="none";

}


}


}


</script>


</body>

</html>
